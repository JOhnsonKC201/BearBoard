<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the navy hero bleed under the iPhone notch
         and the bottom nav tuck under the home-indicator. Individual
         components use env(safe-area-inset-*) for safe padding. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BearBoard - Morgan State</title>
    <meta name="description" content="Posts, study groups, events, and opportunities. All in one place, by students, for students at Morgan State University." />

    <!-- Matches the navy hero so mobile browser chrome and the iOS status
         bar blend with the header instead of flashing white on load. -->
    <meta name="theme-color" content="#0B1D34" />

    <!-- Font loading: preconnect warms the TCP handshake, the stylesheet
         link kicks off font fetches, and display=swap keeps text visible
         while the custom fonts arrive so we don't flash invisible text.

         Archivo + Libre Franklin are the hot-path fonts (Home, Navbar,
         most components) - loaded render-blocking.

         Fraunces is the editorial serif used only on Profile, Leaderboard,
         and the Footer. We request just the weights we actually use
         (drops the opsz 9..144 variable axis that was pulling ~100KB) and
         load the stylesheet non-blocking via the print->all swap so Home's
         first paint isn't gated on it. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- API preconnect — opens the TCP + TLS connection to the backend
         while the HTML is still parsing, so the first /api/home/initial
         fetch (kicked off by main.jsx) doesn't pay DNS/TLS overhead.
         Saves ~100–250ms on cold visits. dns-prefetch as a fallback for
         very old browsers. -->
    <link rel="preconnect" href="https://bearboard-api.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://bearboard-api.onrender.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Libre+Franklin:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
